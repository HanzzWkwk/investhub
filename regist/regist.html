<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../src/output.css" rel="stylesheet" />
    <script src="https://unpkg.com/feather-icons"></script>
    <title>Daftar Ke InvestHub</title>
    <link rel="icon" type="image/png" href="../assets/image.png" />
</head>
<body class="h-screen overflow-hidden bg-[#191919]">
    <div class="flex flex-row cursor-pointer items-center justify-center gap-[10px] mt-[45px] mr-[1300px]" onclick="window.location.href= '../lobby/lobby.html'">
      <i data-feather="arrow-left" class="text-white w-[40px] h-[40px]"></i>
      <h2 class="text-white text-[20px] font-semibold text-center items-center justify-center align-middle">Kembali</h2>
    </div>
    <div class="flex flex-row justify-between align-middle items-center pl-[170px] pr-[170px] mt-[140px]">
        <div>
            <img src="../assets/image.png" alt="">
        </div>
        <div class="flex flex-col justify-center">
             <h2 class="text-white text-[25px] font-bold text-center">Daftar Ke InvestHub</h2> <br>
             <label for="username" class="ml-[10px] mb-[10px] text-white text-[15px] font-semibold text-left items-center justify-center align-middle">Email atau Nomor Telepon</label>
             <input type="text" id="username" placeholder="Masukan Email/Nomor Telepon Anda" required oninvalid="this.setCustomValidity('Email/Nomor Telepon harus diisi')" oninput="this.setCustomValidity('')" class="h-[50px] w-[550px] text-[#191919] text-[15px] font-semibold text-left items-center justify-center align-middle rounded-[15px]">
             <label for="password" class="ml-[10px] mb-[10px] mt-[10px] text-white text-[15px] font-semibold text-left items-center justify-center align-middle">Password</label>
             <input type="password" id="password" placeholder="Masukan Password Anda" required oninvalid="this.setCustomValidity('Password harus diisi')" oninput="this.setCustomValidity('')" class="h-[50px] w-[550px] text-[#191919] text-[15px] font-semibold text-left items-center justify-center align-middle rounded-[15px]">
             <button type="submit" class="font-bold cursor-pointer bg-white text-[#191919] p-[5px] rounded-[50px] w-[250px] h-[45px] duration-300 ease-in-out hover:bg-[#DFDC29] active:bg-white mt-[25px]" onclick=regist()>Masuk</button>
        </div>
    </div>
    <script>
        feather.replace();
    </script>
    <script src="../src/index.js"></script>
</body>
</html>
