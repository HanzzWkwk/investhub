<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../src/output.css" rel="stylesheet" />
    <link rel="icon" type="image/png" href="../assets/image.png" />
    <title>InvestHub</title>
  </head>
  <body class="bg-[#191919]">
    <div class="flex flex-row ml-[220px] mr-[100px] mt-[190px]">
      <div class="">
        <img class="max-w-[800px] mt-[26px]" src="../assets/image.png" />
      </div>
      <div
        class="flex flex-col items-center justify-center ml-[100px] mr-[200px] text-white gap-[50px]"
      >
        <div>
          <h1 class="text-[40px] font-bold text-[#DFDC29]">InvestHub</h1>
        </div>
        <div>
          <p class="text-justify font-bold text-[17px]">
            InvestHub adalah aplikasi investasi yang dilengkapi dengan fitur
            edukasi khusus pemula. Aplikasi ini juga memiliki desain UI yang
            mudah dikuasai oleh pemula dan menampilkan semua biaya yang jelas.
            Aplikasi ini sudah diawasi oleh OJK dan cocok untuk anda yang baru
            berinvestasi
          </p>
        </div>
        <div
          class="flex items-center justify-center bg-[#ffffff] text-black rounded-[20px] font-bold duration-300 hover:bg-[#DFDC29] hover:-translate-y-2 active:translate-y-0 active:bg-white"
        >
          <button onclick="start()" class="cursor-pointer pl-[80px] pr-[80px] pt-[10px] pb-[10px]">Mulai</button>
        </div>
      </div>
    </div>
    <script src="../src/index.js"></script>
  </body>
</html>
